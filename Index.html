<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Warning!</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
            transition: background 0.1s;
        }

        /* Flashing effect for the prank screen */
        .alarm-bg {
            animation: flash-red 0.5s infinite;
        }

        @keyframes flash-red {
            0% { background-color: #000; }
            50% { background-color: #200; }
            100% { background-color: #000; }
        }

        #overlay {
            text-align: center;
            cursor: pointer;
            padding: 50px;
            border: 2px dashed #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }

        #main-prank {
            display: none;
            width: 100%;
            text-align: center;
        }

        .glitch {
            font-size: 8vw;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.05em 0 rgba(0, 255, 0, 0.75); }
        }

        .leak-status {
            font-size: 24px;
            color: #fff;
            margin-top: 20px;
            background: #ff0000;
            padding: 10px 20px;
            display: inline-block;
            font-weight: bold;
        }

        #log-container {
            text-align: left;
            margin: 20px auto;
            max-width: 80%;
            width: 500px;
            color: #00ff00;
            font-size: 14px;
            height: 150px;
            overflow-y: hidden; /* JavaScript will handle scrolling */
            border: 1px solid #333;
            padding: 10px;
            background: rgba(0,0,0,0.8);
        }

        .btn {
            background-color: red;
            color: white;
            padding: 20px 40px;
            font-size: 24px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Starting Screen -->
    <div id="overlay" onclick="startPrank()">
        <h1 style="color: white;">CRITICAL SYSTEM UPDATE</h1>
        <p style="color: #ccc;">Your device needs a security patch (v4.0.2).</p>
        <button class="btn">START SCAN NOW</button>
    </div>

    <!-- Prank Screen -->
    <div id="main-prank">
        <div class="glitch">SYSTEM HACKED!</div>
        <div class="glitch" style="font-size: 3vw;">YOUR DATA IS LEAKING...</div>
        
        <div class="leak-status" id="counter">Data Leaked: 0%</div>
        
        <div id="log-container" id="logs"></div>
    </div>

    <!-- Music / Sound Effect -->
    <audio id="siren-sound" loop>
        <source src="https://www.soundjay.com/misc/sounds/ambulance-siren-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startPrank() {
            // Full screen mode with cross-browser support
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }

            // UI Changes
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-prank').style.display = 'block';
            document.body.classList.add('alarm-bg');

            // Play sound logic
            let audio = document.getElementById('siren-sound');
            audio.play().catch(e => console.log("Audio play blocked by browser"));

            // Counter logic
            let count = 0;
            let counterElement = document.getElementById('counter');
            let counterInterval = setInterval(() => {
                count++;
                counterElement.innerText = "Data Leaked: " + count + "%";
                if (count >= 100) {
                    clearInterval(counterInterval);
                    finishPrank();
                }
            }, 150);

            // Fake Log Lines
            const logs = [
                "Establishing connection to dark_web_666...",
                "Bypassing Firewall...",
                "IP Address: 192.168.1.104 Detected",
                "Accessing Private Gallery...",
                "Downloading WhatsApp Databases...",
                "Extracting Contacts...",
                "Extracting Bank Credentials...",
                "Warning: System Security Disabled!",
                "Sending Data to Remote Server [UK]...",
                "Deleting System32 Files...",
                "Root Access: GRANTED",
                "Encrypting Hard Drive...",
                "Prank Status: 100% Successful"
            ];

            let logContainer = document.getElementById('log-container');
            let i = 0;
            let logInterval = setInterval(() => {
                if (i < logs.length) {
                    let p = document.createElement("p");
                    p.innerHTML = "> " + logs[i];
                    p.style.margin = "5px 0";
                    logContainer.appendChild(p);
                    
                    // Auto scroll to bottom
                    logContainer.scrollTop = logContainer.scrollHeight;
                    i++;
                } else {
                    clearInterval(logInterval);
                }
            }, 800);
        }

        function finishPrank() {
            setTimeout(() => {
                alert("YOU GOT PRANKED! 😂\n\nDon't worry, nothing happened to your device.");
                location.reload(); // Reset the page
            }, 1000);
        }
    </script>
</body>
    </html>
