<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Warning!</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        #overlay {
            text-align: center;
            cursor: pointer;
            padding: 50px;
            border: 2px dashed #ff0000;
        }

        #main-prank {
            display: none;
            width: 100%;
            text-align: center;
        }

        .glitch {
            font-size: 5vw;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.05em 0 rgba(0, 255, 0, 0.75); }
        }

        .leak-status {
            font-size: 20px;
            color: #fff;
            margin-top: 20px;
            background: #330000;
            padding: 10px;
            display: inline-block;
        }

        #log-container {
            text-align: left;
            margin: 20px auto;
            max-width: 600px;
            color: #00ff00;
            font-size: 14px;
            height: 150px;
            overflow: hidden;
        }

        .btn {
            background-color: red;
            color: white;
            padding: 20px 40px;
            font-size: 24px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Starting Screen -->
    <div id="overlay" onclick="startPrank()">
        <h1 style="color: white;">CRITICAL SYSTEM UPDATE</h1>
        <p style="color: #ccc;">Your device needs a security patch.</p>
        <button class="btn">START SCAN NOW</button>
    </div>

    <!-- Prank Screen -->
    <div id="main-prank">
        <div class="glitch">SYSTEM HACKED!</div>
        <div class="glitch" style="font-size: 3vw;">YOUR DATA IS LEAKING...</div>
        
        <div class="leak-status" id="counter">Data Leaked: 0%</div>
        
        <div id="log-container"></div>
    </div>

    <!-- Music / Sound Effect -->
    <!-- Maine ek Siren music link add kiya hai -->
    <audio id="siren-sound" loop>
        <source src="https://www.soundjay.com/misc/sounds/ambulance-siren-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startPrank() {
            // Full screen mode
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Hide start screen, show prank
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-prank').style.display = 'block';
            document.body.style.backgroundColor = "black";

            // Play music
            let audio = document.getElementById('siren-sound');
            audio.play();

            // Counter logic
            let count = 0;
            let counterElement = document.getElementById('counter');
            let counterInterval = setInterval(() => {
                count++;
                counterElement.innerText = "Data Leaked: " + count + "%";
                if (count >= 100) clearInterval(counterInterval);
            }, 100);

            // Fake Log Lines
            const logs = [
                "Establishing connection to dark_web_666...",
                "Bypassing Google Encryption...",
                "Accessing Private Photos...",
                "Downloading WhatsApp Databases...",
                "Extracting Bank Credentials...",
                "Sending IP 102.16.8.1 to Remote Server...",
                "Contact List Copied...",
                "Warning: Security Shield Disabled!",
                "Deleting System Root Files...",
                "Remote Control Access: GRANTED"
            ];

            let logContainer = document.getElementById('log-container');
            let i = 0;
            let logInterval = setInterval(() => {
                if (i < logs.length) {
                    let p = document.createElement("p");
                    p.innerHTML = "> " + logs[i];
                    p.style.margin = "5px 0";
                    logContainer.appendChild(p);
                    i++;
                } else {
                    clearInterval(logInterval);
                }
            }, 700);
        }
    </script>
</body>
</html>
